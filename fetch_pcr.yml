name: Fetch NSE PCR + VIX

on:
  schedule:
    # Every 5 minutes, Mon-Fri 3:45 UTC to 10:00 UTC (= 9:15 to 15:30 IST)
    - cron: '*/5 3-10 * * 1-5'
    # Also run at 3:44 UTC (just before market open) to warm up
    - cron: '44 3 * * 1-5'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit pcr.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch PCR + VIX
        run: python fetch_pcr.py

      - name: Commit pcr.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pcr.json
          # Only commit if pcr.json changed
          git diff --staged --quiet || git commit -m "Auto: PCR update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
